<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charraiá do Théo · Festa Junina</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0e3a36;
            background-image:
                linear-gradient(45deg, #1b6258 25%, transparent 25%, transparent 75%, #1b6258 75%, #1b6258),
                linear-gradient(45deg, #1b6258 25%, transparent 25%, transparent 75%, #1b6258 75%, #1b6258);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            font-family: 'Segoe UI', 'Arial Rounded MT Bold', 'Comic Neue', 'Fredoka One', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .story-convite {
            max-width: 430px;
            width: 100%;
            border-radius: 28px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
            padding: 14px;
            background: repeating-linear-gradient(
                -45deg,
                #b9854a 0px, #b9854a 10px,
                #8a5e2c 10px, #8a5e2c 20px
            );
        }

        .story-convite::before {
            content: "";
            position: absolute;
            inset: 14px;
            background: #1b6258;
            border-radius: 18px;
            z-index: 0;
        }

        .story-convite > * {
            position: relative;
            z-index: 1;
        }

        .story-inner {
            border-radius: 18px;
            overflow: hidden;
            padding-bottom: 10px;
        }

        /* ===== BANDEIRINHAS (SVG) ===== */
        .bandeirinhas {
            width: 100%;
            display: block;
            margin-bottom: -8px;
        }

        /* ===== PLACA DE MADEIRA REFEITA COM TEXTO DENTRO DO SVG ===== */
        .placa-wrap {
            position: relative;
            padding: 6px 10px 15px;
            overflow: visible;
        }
        .placa-svg {
            width: 100%;
            height: auto;
            display: block;
        }
        
        /* Estilização do texto dentro do SVG para não desalinhar */
        .svg-texto {
            font-family: 'Arial Rounded MT Bold', 'Fredoka One', cursive;
            text-anchor: middle;
            font-weight: 900;
        }
        .svg-charraia {
            font-size: 32px;
            fill: #fff7e8;
        }
        .svg-do {
            font-size: 20px;
            fill: #ffd98a;
        }
        .svg-theo {
            font-size: 46px;
            fill: #fffaf0;
        }

        /* ===== MENINO CAIPIRA (Ajustado posicionamento flexível) ===== */
        .menino-placeholder {
            position: absolute;
            left: 5px;
            bottom: 0px;
            width: 35%;
            max-width: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            z-index: 3;
        }
        .menino-placeholder img {
            width: 100%;
            height: auto;
            object-fit: contain;
            display: block;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.35));
        }

        /* ===== CONTEÚDO PRINCIPAL ===== */
        .conteudo {
            padding: 15px 15px 0;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .frase-principal {
            color: #ffe27a;
            font-weight: 900;
            font-size: 1.1rem;
            line-height: 1.4;
            text-transform: uppercase;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
            margin-bottom: 15px;
            word-wrap: break-word;
        }

        .espero {
            color: #ffe27a;
            font-weight: 900;
            font-size: 1.4rem;
            text-transform: uppercase;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
            margin-bottom: 6px;
        }

        .data-dia {
            color: #f4a259;
            font-weight: 900;
            font-size: 2.4rem;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
            line-height: 1.2;
        }
        .data-sub {
            color: #f4a259;
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
            margin-bottom: 15px;
        }

        /* ===== BOTÕES CIRCULARES ===== */
        .botoes-arraia {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 10px 0 15px;
        }
        .btn-junino {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: transform 0.15s ease;
        }
        .btn-junino:hover {
            transform: translateY(-3px);
        }
        .circulo-amarelo {
            width: 100%;
            max-width: 80px;
            aspect-ratio: 1/1;
            border-radius: 50%;
            background: #ffd400;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 rgba(0,0,0,0.15);
        }
        .circulo-amarelo svg {
            width: 50%;
            height: 50%;
        }
        .btn-junino span {
            font-size: 0.65rem;
            font-weight: 900;
            color: #ffe27a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1.2;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
            text-align: center;
        }

        /* ===== LISTA DE SUGESTÕES (RETRÁTIL) ===== */
        .presentes-lista {
            background: #ffffff;
            border-radius: 24px;
            padding: 14px;
            margin: 0 0 16px;
            border: 2px solid #ffd98a;
            display: none;
            box-shadow: 0 8px 18px rgba(0,0,0,0.15);
            text-align: center;
        }
        .presentes-lista h4 {
            color: #b6451a;
            font-weight: 800;
            font-size: 1rem;
            margin-bottom: 12px;
        }
        .grid-presentes {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            list-style: none;
            padding: 0;
        }
        .grid-presentes li {
            background: #fff4e5;
            padding: 6px 12px;
            border-radius: 60px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #803a18;
            border-left: 3px solid #f5a65b;
        }
        .fechar-lista {
            margin-top: 12px;
        }
        .fechar-lista button {
            background: #ffe27a;
            border: none;
            font-size: 0.7rem;
            font-weight: bold;
            color: #ac4f26;
            padding: 6px 18px;
            border-radius: 30px;
            cursor: pointer;
        }

        /* ===== TRAJE CAIPIRA ===== */
        .traje-caipira {
            color: #ffe27a;
            font-weight: 900;
            font-size: 1rem;
            text-transform: uppercase;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
            line-height: 1.4;
            text-align: center;
            margin-bottom: 8px;
        }

        /* ===== QUADRO DE FOTO EXTRA ===== */
        .foto-placeholder {
            width: calc(100% - 30px);
            aspect-ratio: 16/9;
            border-radius: 24px;
            border: 3px dashed #ffd98a;
            background: rgba(255,255,255,0.06);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 10px auto 15px;
            overflow: hidden;
            color: #ffe27a;
            font-weight: 800;
            font-size: 0.8rem;
        }
        .foto-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ===== MEDIA QUERIES PARA CELULARES MUITO PEQUENOS ===== */
        @media (max-width: 360px) {
            .placa-wrap { padding-bottom: 5px; }
            .frase-principal { font-size: 0.95rem; }
            .data-dia { font-size: 2rem; }
            .data-sub { font-size: 1.3rem; }
            .btn-junino span { font-size: 0.55rem; }
            .espero { font-size: 1.2rem; }
            .traje-caipira { font-size: 0.85rem; }
        }
    </style>
</head>
